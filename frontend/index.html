<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BFHL Hierarchy Visualizer</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 30px;
    }
    h1 {
      text-align: center;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: #0056b3;
    }
    pre {
      background: #272822;
      color: #f8f8f2;
      padding: 15px;
      overflow-x: auto;
      border-radius: 5px;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>

  <h1>Hierarchy Visualizer</h1>

  <div class="container">
    <label>Enter Node Relationships (comma separated):</label>
    <textarea id="input" placeholder="Example: A->B, A->C, B->D"></textarea>

    <button onclick="submitData()">Submit</button>

    <p class="error" id="error"></p>

    <h3>Response:</h3>
    <pre id="output"></pre>
  </div>

  <script>
    async function submitData() {
      const input = document.getElementById("input").value;
      const errorEl = document.getElementById("error");
      const outputEl = document.getElementById("output");

      errorEl.innerText = "";
      outputEl.innerText = "";

      if (!input.trim()) {
        errorEl.innerText = "Please enter some data.";
        return;
      }

      const dataArray = input.split(",").map(x => x.trim());

      try {
        const response = await fetch("http://localhost:3000/bfhl", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ data: dataArray })
        });

        if (!response.ok) {
          throw new Error("API Error");
        }

        const result = await response.json();

        outputEl.innerText = JSON.stringify(result, null, 2);

      } catch (err) {
        errorEl.innerText = "Failed to connect to API.";
      }
    }
  </script>

</body>
</html>
